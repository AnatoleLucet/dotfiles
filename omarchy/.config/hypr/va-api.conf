# === GPU CONFIGURATION ===
# NVIDIA dGPU (MX250) + Intel iGPU (UHD 620)
# NOTE: Main GPU env vars (GBM_BACKEND, AQ_DRM_DEVICES) are set BEFORE Hyprland starts
# via ~/.local/bin/hyprland-nvidia launcher or /etc/environment

# VA-API: Use Intel for video decode (more efficient)
env = LIBVA_DRIVER_NAME,iHD
env = VDPAU_DRIVER,va_gl
env = LIBVA_DRIVERS_PATH,/usr/lib/dri

# === NVIDIA WORKAROUNDS ===
cursor {
    no_hardware_cursors = true
}

misc {
    vrr = 0
    vfr = true
}
